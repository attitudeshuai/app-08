services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: exam_system
      MYSQL_USER: exam
      MYSQL_PASSWORD: exam123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  backend:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://exam:exam123@mysql:3306/exam_system"
      JWT_SECRET: "exam-system-secret-key-2024"
      PORT: 3008
      NODE_ENV: production
    ports:
      - "3008:3008"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  mysql_data:
